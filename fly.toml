app = "canary-conduit-demo"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.fly"

[deploy]
  release_command = "npx prisma migrate deploy --schema src/prisma/schema.prisma"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
